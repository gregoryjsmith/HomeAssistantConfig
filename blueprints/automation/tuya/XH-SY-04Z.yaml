blueprint:
  name: Moes XH-SY-04Z 4 Button Remote - Zigbee2MQTT MQTT
  description: Uses zigbee2mqtt/<device name>/action topic directly.
  domain: automation

  input:
    mqtt_topic:
      name: MQTT action topic
      description: Example: zigbee2mqtt/Moes Scene Remote 1/action
      default: zigbee2mqtt/Moes Scene Remote 1/action
      selector:
        text:

    button_1_single:
      name: Button 1 single
      default: []
      selector: { action: {} }
    button_1_double:
      name: Button 1 double
      default: []
      selector: { action: {} }
    button_1_hold:
      name: Button 1 hold
      default: []
      selector: { action: {} }

    button_2_single:
      name: Button 2 single
      default: []
      selector: { action: {} }
    button_2_double:
      name: Button 2 double
      default: []
      selector: { action: {} }
    button_2_hold:
      name: Button 2 hold
      default: []
      selector: { action: {} }

    button_3_single:
      name: Button 3 single
      default: []
      selector: { action: {} }
    button_3_double:
      name: Button 3 double
      default: []
      selector: { action: {} }
    button_3_hold:
      name: Button 3 hold
      default: []
      selector: { action: {} }

    button_4_single:
      name: Button 4 single
      default: []
      selector: { action: {} }
    button_4_double:
      name: Button 4 double
      default: []
      selector: { action: {} }
    button_4_hold:
      name: Button 4 hold
      default: []
      selector: { action: {} }

mode: restart
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: !input mqtt_topic

action:
  - variables:
      command: "{{ trigger.payload }}"

  - choose:
      - conditions: "{{ command == '1_single' }}"
        sequence: !input button_1_single
      - conditions: "{{ command == '1_double' }}"
        sequence: !input button_1_double
      - conditions: "{{ command == '1_hold' }}"
        sequence: !input button_1_hold

      - conditions: "{{ command == '2_single' }}"
        sequence: !input button_2_single
      - conditions: "{{ command == '2_double' }}"
        sequence: !input button_2_double
      - conditions: "{{ command == '2_hold' }}"
        sequence: !input button_2_hold

      - conditions: "{{ command == '3_single' }}"
        sequence: !input button_3_single
      - conditions: "{{ command == '3_double' }}"
        sequence: !input button_3_double
      - conditions: "{{ command == '3_hold' }}"
        sequence: !input button_3_hold

      - conditions: "{{ command == '4_single' }}"
        sequence: !input button_4_single
      - conditions: "{{ command == '4_double' }}"
        sequence: !input button_4_double
      - conditions: "{{ command == '4_hold' }}"
        sequence: !input button_4_hold
