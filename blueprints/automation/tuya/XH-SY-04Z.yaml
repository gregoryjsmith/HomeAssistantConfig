blueprint:
  name: Moes XH-SY-04Z 4 Button Remote (MQTT)
  description: "Uses Zigbee2MQTT action topic directly, with a common target."
  domain: automation

  input:
    mqtt_topic:
      name: MQTT action topic
      description: "Example: zigbee2mqtt/Moes Scene Remote 1/action"
      default: "zigbee2mqtt/Moes Scene Remote 1/action"
      selector:
        text:

    target:
      name: Common target
      description: "Target used by the button actions."
      selector:
        target:

    button_1_single:
      name: Button 1 Single
      default: []
      selector:
        action: {}

    button_1_double:
      name: Button 1 Double
      default: []
      selector:
        action: {}

    button_1_hold:
      name: Button 1 Hold
      default: []
      selector:
        action: {}

    button_2_single:
      name: Button 2 Single
      default: []
      selector:
        action: {}

    button_2_double:
      name: Button 2 Double
      default: []
      selector:
        action: {}

    button_2_hold:
      name: Button 2 Hold
      default: []
      selector:
        action: {}

    button_3_single:
      name: Button 3 Single
      default: []
      selector:
        action: {}

    button_3_double:
      name: Button 3 Double
      default: []
      selector:
        action: {}

    button_3_hold:
      name: Button 3 Hold
      default: []
      selector:
        action: {}

    button_4_single:
      name: Button 4 Single
      default: []
      selector:
        action: {}

    button_4_double:
      name: Button 4 Double
      default: []
      selector:
        action: {}

    button_4_hold:
      name: Button 4 Hold
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: mqtt
    topic: !input mqtt_topic

variables:
  command: "{{ trigger.payload }}"
  target: !input target

action:
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ command == '1_single' }}"
        sequence: !input button_1_single

      - conditions:
          - condition: template
            value_template: "{{ command == '1_double' }}"
        sequence: !input button_1_double

      - conditions:
          - condition: template
            value_template: "{{ command == '1_hold' }}"
        sequence: !input button_1_hold

      - conditions:
          - condition: template
            value_template: "{{ command == '2_single' }}"
        sequence: !input button_2_single

      - conditions:
          - condition: template
            value_template: "{{ command == '2_double' }}"
        sequence: !input button_2_double

      - conditions:
          - condition: template
            value_template: "{{ command == '2_hold' }}"
        sequence: !input button_2_hold

      - conditions:
          - condition: template
            value_template: "{{ command == '3_single' }}"
        sequence: !input button_3_single

      - conditions:
          - condition: template
            value_template: "{{ command == '3_double' }}"
        sequence: !input button_3_double

      - conditions:
          - condition: template
            value_template: "{{ command == '3_hold' }}"
        sequence: !input button_3_hold

      - conditions:
          - condition: template
            value_template: "{{ command == '4_single' }}"
        sequence: !input button_4_single

      - conditions:
          - condition: template
            value_template: "{{ command == '4_double' }}"
        sequence: !input button_4_double

      - conditions:
          - condition: template
            value_template: "{{ command == '4_hold' }}"
        sequence: !input button_4_hold
